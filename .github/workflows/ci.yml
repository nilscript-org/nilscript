name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (dev + demo extras)
        # [dev] pulls the MCP SDK; [demo] adds uvicorn so the MCP stdio↔shim e2e runs (not skipped).
        run: pip install -e ".[dev,demo]"
      - name: Run the suite
        run: pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Validate distribution metadata (PyPI render)
        run: twine check dist/*

  lint:
    name: ruff (informational)
    runs-on: ubuntu-latest
    continue-on-error: true   # no ruff config committed yet — surfaced, not gating
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . || true
