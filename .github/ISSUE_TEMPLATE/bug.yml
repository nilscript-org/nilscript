name: Bug report
description: Something in the CLI, SDK, schemas, or conformance harness is wrong.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: nilscript version
      placeholder: "0.3.0 (or git sha)"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [CLI, SDK, schemas/spec, conformance harness, scaffold-shim, scan, manifest, docs]
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands + the smallest input that triggers it.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
