<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="NILScript — the agent can only propose; nothing writes until you approve">
  <defs>
    <!-- hand-drawn jitter: roughen every stroke like a pencil sketch -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughText" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.02" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <style>
    .mono { font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace; }
    .ink  { fill: #EAEEF2; }
    .dim  { fill: #6B7480; }
  </style>

  <!-- background -->
  <rect width="1280" height="640" fill="#05070A"/>

  <!-- kicker + headline -->
  <text class="mono dim" x="640" y="78" text-anchor="middle" font-size="14" letter-spacing="6" filter="url(#roughText)">NETWORK&#160;&#160;INTENT&#160;&#160;LAYER</text>
  <text class="mono ink" x="640" y="122" text-anchor="middle" font-size="31" font-weight="700" letter-spacing="-0.5" filter="url(#roughText)">Hallucinations can&#8217;t write.</text>

  <!-- ===================== hand-drawn line art ===================== -->
  <g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- AGENT (top lane, bright) -->
    <g stroke="#EAEEF2">
      <rect x="158" y="222" width="56" height="46" rx="11" stroke-width="2.6"/>
      <line x1="186" y1="222" x2="186" y2="208" stroke-width="2.4"/>
      <circle cx="186" cy="203" r="4.2" stroke-width="2.2"/>
      <line x1="173" y1="256" x2="199" y2="256" stroke-width="2.4"/>
    </g>
    <g fill="#EAEEF2" stroke="none"><circle cx="173" cy="241" r="3.1"/><circle cx="199" cy="241" r="3.1"/></g>

    <!-- agent -> gate -->
    <g stroke="#EAEEF2" stroke-width="2.6">
      <line x1="246" y1="246" x2="540" y2="246"/>
      <path d="M528 238 L540 246 L528 254"/>
    </g>

    <!-- SKULL / injection (bottom lane, muted) -->
    <g stroke="#6B7480" stroke-width="2.4">
      <circle cx="186" cy="422" r="27"/>
      <path d="M170 446 q16 12 32 0"/>
      <line x1="178" y1="448" x2="178" y2="458"/>
      <line x1="186" y1="450" x2="186" y2="460"/>
      <line x1="194" y1="448" x2="194" y2="458"/>
    </g>
    <g fill="#6B7480" stroke="none">
      <ellipse cx="175" cy="420" rx="6" ry="7.5"/>
      <ellipse cx="197" cy="420" rx="6" ry="7.5"/>
      <path d="M186 430 L181 440 L191 440 Z"/>
    </g>

    <!-- skull -> gate -->
    <g stroke="#6B7480" stroke-width="2.4">
      <line x1="246" y1="434" x2="540" y2="434"/>
      <path d="M528 426 L540 434 L528 442"/>
    </g>

    <!-- THE NIL GATE -->
    <rect x="548" y="196" width="184" height="288" rx="18" fill="#080B11" stroke="#EAEEF2" stroke-width="3"/>
    <rect x="554" y="202" width="172" height="276" rx="14" stroke="#EAEEF2" stroke-width="1" opacity="0.22"/>

    <!-- approved write leaves the gate (top, bright) -->
    <g stroke="#EAEEF2" stroke-width="2.6">
      <line x1="732" y1="246" x2="1004" y2="246"/>
      <path d="M992 238 L1004 246 L992 254"/>
    </g>
    <!-- check -->
    <path d="M1034 248 L1048 262 L1074 230" stroke="#EAEEF2" stroke-width="4"/>

    <!-- hijack stops at the gate (bottom) -->
    <g stroke="#9AA3B0" stroke-width="4">
      <line x1="724" y1="420" x2="752" y2="448"/>
      <line x1="752" y1="420" x2="724" y2="448"/>
    </g>
  </g>

  <!-- gate label: the <nil> mark -->
  <text class="mono" x="640" y="353" text-anchor="middle" font-size="40" font-weight="700" letter-spacing="-1" filter="url(#roughText)">
    <tspan class="ink" opacity="0.4">&lt;</tspan><tspan class="ink">nil</tspan><tspan class="ink" opacity="0.4">&gt;</tspan>
  </text>

  <!-- labels -->
  <text class="mono dim" x="186" y="300" text-anchor="middle" font-size="15" filter="url(#roughText)">agent</text>
  <text class="mono dim" x="186" y="492" text-anchor="middle" font-size="14" filter="url(#roughText)">prompt injection</text>
  <text class="mono dim" x="1054" y="300" text-anchor="middle" font-size="15" filter="url(#roughText)">approved</text>
  <text class="mono dim" x="800" y="439" text-anchor="start" font-size="15" filter="url(#roughText)">blocked</text>

  <!-- footer caption -->
  <text class="mono dim" x="640" y="566" text-anchor="middle" font-size="17" filter="url(#roughText)">an agent can only propose &#8212; nothing writes until you approve</text>
</svg>
